<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Config Flowchart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f2eb;
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    min-height: 100vh;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 32px;
  }

  svg {
    max-width: 520px;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.07));
  }

  /* Shape styles */
  .terminal { fill: #1a1a1a; }
  .terminal-text { fill: #f5f2eb; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }

  .process { fill: #fff; stroke: #1a1a1a; stroke-width: 2; }
  .process-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; fill: #1a1a1a; }
  .process-detail { font-family: 'IBM Plex Sans', sans-serif; font-size: 10.5px; fill: #444; }

  .struct-rect { fill: #fff; stroke: #1a1a1a; stroke-width: 2; }
  .struct-stripe { fill: #1a1a1a; }
  .struct-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; fill: #f5f2eb; }
  .struct-attr { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #333; }

  .arrow { stroke: #1a1a1a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .note { font-family: 'IBM Plex Sans', sans-serif; font-size: 9.5px; fill: #888; font-style: italic; }
</style>
</head>
<body>
<h1>APS145 — Flowchart: Game Config</h1>

<svg viewBox="0 0 440 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════ -->
  <!-- START terminal (squashed oval)      -->
  <!-- ═══════════════════════════════════ -->
  <ellipse cx="220" cy="48" rx="80" ry="28" class="terminal"/>
  <text x="220" y="52" text-anchor="middle" class="terminal-text">main()</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="76" x2="220" y2="105" class="arrow"/>

  <!-- ═══════════════════════════════════ -->
  <!-- STRUCTURE DEFINITION (striped rect) -->
  <!-- ═══════════════════════════════════ -->
  <!-- Outer rect -->
  <rect x="60" y="108" width="300" height="195" rx="0" class="struct-rect"/>
  <!-- Top stripe (signals complex/structure block) -->
  <rect x="60" y="108" width="300" height="22" class="struct-stripe"/>
  <!-- Stripe label -->
  <text x="210" y="124" text-anchor="middle" class="struct-label">DEFINE: GameConfig</text>

  <!-- Attributes -->
  <text x="88" y="152" class="struct-attr">-  playerName</text>
  <text x="88" y="170" class="struct-attr">-  mapRows</text>
  <text x="88" y="188" class="struct-attr">-  mapCols</text>
  <text x="88" y="206" class="struct-attr">-  numEnemies</text>
  <text x="88" y="224" class="struct-attr">-  numLives</text>
  <text x="88" y="242" class="struct-attr">-  minEnemyDefeats</text>
  <text x="88" y="260" class="struct-attr">-  timeLimitSecs</text>
  <text x="88" y="278" class="struct-attr">-  numLevels</text>

  <!-- Side note -->
  <text x="368" y="155" class="note">type</text>
  <text x="368" y="167" class="note">blueprint</text>
  <text x="368" y="179" class="note">(not a var)</text>

  <!-- Arrow 2 -->
  <line x1="220" y1="303" x2="220" y2="345" class="arrow"/>

  <!-- ═══════════════════════════════════ -->
  <!-- DECLARE variable (plain rectangle)  -->
  <!-- ═══════════════════════════════════ -->
  <rect x="80" y="348" width="280" height="60" class="process"/>
  <text x="220" y="370" text-anchor="middle" class="process-label">DECLARE:</text>
  <text x="220" y="390" text-anchor="middle" class="process-detail">config = EMPTY  (type: GameConfig)</text>

  <!-- Arrow 3 -->
  <line x1="220" y1="408" x2="220" y2="448" class="arrow"/>

  <!-- ═══════════════════════════════════ -->
  <!-- END terminal                        -->
  <!-- ═══════════════════════════════════ -->
  <ellipse cx="220" cy="470" rx="80" ry="28" class="terminal"/>
  <text x="220" y="474" text-anchor="middle" class="terminal-text">End</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LEGEND                              -->
  <!-- ═══════════════════════════════════ -->
  <line x1="60" y1="530" x2="380" y2="530" stroke="#ddd" stroke-width="1"/>
  <text x="220" y="554" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="#aaa" letter-spacing="0.1em" text-transform="uppercase">LEGEND</text>

  <!-- Terminal symbol -->
  <ellipse cx="100" cy="588" rx="36" ry="16" fill="#1a1a1a"/>
  <text x="100" y="592" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#f5f2eb">Start / End</text>

  <!-- Striped rect -->
  <rect x="168" y="572" width="90" height="32" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="168" y="572" width="90" height="11" fill="#1a1a1a"/>
  <text x="213" y="581" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#f5f2eb">Structure Def</text>
  <text x="213" y="598" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="8.5" fill="#555">(complex block)</text>

  <!-- Plain rect -->
  <rect x="288" y="572" width="90" height="32" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="333" y="593" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="8.5" fill="#333">Process / Action</text>

  <!-- Legend labels -->
  <text x="100" y="618" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="8" fill="#aaa">Terminal</text>
  <text x="213" y="618" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="8" fill="#aaa">Striped Rect</text>
  <text x="333" y="618" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="8" fill="#aaa">Rectangle</text>
</svg>

</body>
</html>
